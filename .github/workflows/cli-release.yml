name: CLI Release
on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup RAD Studio 11.3
        uses: emabdelatty/setup-delphi@v1
        with:
          version: '11.3'

      - name: Build MinusMigrator_CLI (Release, Win32)
        run: msbuild MinusMigrator_CLI.dproj /p:Config=Release /p:Platform=Win32

      - name: Run tests
        shell: pwsh
        run: |
          $testPath = "Tests\Win32\Release\Test.MinusMigrator_CLI.exe"
          if (Test-Path $testPath) {
            & $testPath
          } else {
            Write-Host "No test executable found at $testPath — skipping"
          }

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $exePaths = @("Win32\Release\MinusMigrator_CLI.exe")
          $found = $false
          foreach ($p in $exePaths) {
            if (Test-Path $p) {
              Copy-Item $p artifacts\MinusMigrator_CLI.exe
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Warning "MinusMigrator_CLI.exe not found — checking directory contents"
            Get-ChildItem -Recurse -Filter "MinusMigrator_CLI.exe" | Select-Object FullName
          }
          if (Test-Path "install.ps1") {
            Copy-Item install.ps1 artifacts\
          }

      - uses: actions/upload-artifact@v4
        with:
          name: MinusMigrator_CLI
          path: artifacts/

      - if: startsWith(github.ref, 'refs/tags/v')
        name: Package release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path artifacts\* -DestinationPath "MinusMigrator_CLI-$tag.zip"

      - if: startsWith(github.ref, 'refs/tags/v')
        name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: MinusMigrator_CLI-${{ github.ref_name }}.zip
